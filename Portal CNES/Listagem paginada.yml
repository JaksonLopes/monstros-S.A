      //     "municipio": "string",
      //     "gestao": "F"
      //     "naturezaJuridica": "ADMINISTRACAO_PUBLICA",
      //     "atendeSus": false
        },
        "pageNumber": 5,
        "pageSize": 10
      //   ,
      //   "sort": {
      //     "field": "nmFantasia",
      //     "direction": "ASC"
      //   }
      }
